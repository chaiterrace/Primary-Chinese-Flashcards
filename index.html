<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Noto+Serif+SC:wght@500;700&family=Ma+Shan+Zheng&family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
    .font-chinese { font-family: "STKaiti", "Kaiti", "DFKai-SB", "楷体", "BiauKai", "Noto Serif SC", "Ma Shan Zheng", serif; }
    .font-title { font-family: 'Mitr', sans-serif; }
    .card-size { width: 90mm; height: 54mm; box-sizing: border-box; position: relative; overflow: hidden; }
    .a4-grid { display: grid; grid-template-columns: 90mm 90mm; grid-template-rows: repeat(5, 54mm); justify-content: center; gap: 0px; }
    .flip-card { perspective: 1000px; }
    .flip-card-inner { transition: transform 0.6s; transform-style: preserve-3d; }
    .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
    .flip-card-front, .flip-card-back { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
    .flip-card-back { transform: rotateY(180deg); }
    @media print {
      body { background: white !important; margin: 0 !important; }
      .no-print { display: none !important; }
      .print-page { width: 210mm; height: 297mm; padding: 13.5mm 10mm !important; page-break-after: always; box-sizing: border-box; }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">

  <div id="app" class="min-h-screen flex flex-col relative" @click="handleFirstInteraction" @touchstart="handleFirstInteraction">
    
    <header class="no-print bg-gradient-to-r from-red-500 via-rose-500 to-orange-500 text-white shadow-md">
      <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-3">
          <div class="bg-white/20 p-2 rounded-xl backdrop-blur-sm"><i data-lucide="sparkles" class="w-8 h-8 text-yellow-300"></i></div>
          <div>
            <h1 class="font-title text-2xl font-bold tracking-wide">Primary Chinese Flashcards</h1>
          </div>
        </div>
        <div class="flex bg-white/10 p-1 rounded-xl backdrop-blur-md font-title font-bold">
          <button @click="switchView('play')" :class="activeView === 'play' ? 'bg-white text-rose-600 shadow-sm' : 'text-white'" class="px-4 py-2 rounded-lg text-xs transition">กิจกรรม</button>
          <button @click="switchView('print')" :class="activeView === 'print' ? 'bg-white text-rose-600 shadow-sm' : 'text-white'" class="px-4 py-2 rounded-lg text-xs transition">พิมพ์</button>
          <button @click="switchView('manager')" :class="activeView === 'manager' ? 'bg-white text-rose-600 shadow-sm' : 'text-white'" class="px-4 py-2 rounded-lg text-xs transition">จัดการ ({{ cards.length }})</button>
        </div>
      </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto p-4 lg:p-6">
      <!-- Manager View ที่มีปุ่มกู้คืนข้อมูล -->
      <section v-if="activeView === 'manager'" class="space-y-6">
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
          <div class="flex justify-between items-center mb-4">
            <h2 class="font-title text-lg font-bold">จัดการคลังคำศัพท์</h2>
            <button @click="resetToDefault" class="bg-rose-500 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-rose-600 transition">🔄 กู้คืนข้อมูลแบบเรียน (49 คำ)</button>
          </div>
          <div class="overflow-x-auto max-h-[500px]">
            <table class="w-full text-left text-xs border-collapse">
              <thead><tr class="bg-slate-100 border-b">
                <th class="py-3 px-4">#</th>
                <th class="py-3 px-3">ตัวจีน</th>
                <th class="py-3 px-3">พินอิน</th>
                <th class="py-3 px-3">ไทย</th>
              </tr></thead>
              <tbody>
                <tr v-for="(card, idx) in cards" :key="card.id" class="border-b">
                  <td class="py-2.5 px-4">{{ idx + 1 }}</td>
                  <td class="py-2.5 px-2"><input v-model="card.chinese" class="font-chinese border p-1 rounded w-24"></td>
                  <td class="py-2.5 px-2"><input v-model="card.pinyin" class="border p-1 rounded w-28"></td>
                  <td class="py-2.5 px-2"><input v-model="card.thai" class="border p-1 rounded w-full"></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
      
      <div v-else class="text-center p-10 text-slate-500 font-title">กำลังโหลดระบบ...</div>
    </main>
  </div>

      { id: 34, category: "3. เวลาและนาฬิกา (Time)", chinese: "十点五十五分", pinyin: "shí diǎn wǔ shí wǔ fēn", thai: "10 โมง 55 นาที", emoji: "🕙" },

      { id: 37, category: "3. เวลาและนาฬิกา (Time)", chinese: "你几点去上学", pinyin: "nǐ jǐ diǎn qù shàng xué", thai: "คุณไปโรงเรียนกี่โมง", emoji: "🎒" },
      { id: 38, category: "3. เวลาและนาฬิกา (Time)", chinese: "你几点放学回家", pinyin: "nǐ jǐ diǎn fàng xué huí jiā", thai: "คุณเลิกเรียนกลับบ้านกี่โมง", emoji: "🏠" },

      { id: 47, category: "4. วันเกิด & อารมณ์ (Birthday)", chinese: "我七岁了", pinyin: "wǒ qī suì le", thai: "ฉันอายุเจ็ดขวบแล้ว", emoji: "7️⃣" },

      { id: 49, category: "4. วันเกิด & อารมณ์ (Birthday)", chinese: "我今天很开心", pinyin: "wǒ jīn tiān hěn kāi xīn", thai: "วันนี้ฉันมีความสุขมาก", emoji: "🥰" }
    ];

    createApp({
      setup() {
        const activeView = ref('manager');
        const cards = ref([]);
        const toasts = ref([]);

        onMounted(() => {
          // โหลดจาก LocalStorage ถ้ามี
          const saved = localStorage.getItem('flashcard_data');
          if (saved) {
            cards.value = JSON.parse(saved);
          } else {
            cards.value = JSON.parse(JSON.stringify(defaultCards));
          }
        });

        const resetToDefault = () => {
          if (confirm('ยืนยันกู้คืนคำศัพท์ต้นฉบับ?')) {
            cards.value = JSON.parse(JSON.stringify(defaultCards));
            localStorage.setItem('flashcard_data', JSON.stringify(cards.value));
            alert('กู้คืนข้อมูลสำเร็จ!');
          }
        };

        watch(cards, (newVal) => {
          localStorage.setItem('flashcard_data', JSON.stringify(newVal));
        }, { deep: true });

        return { activeView, cards, switchView: (v) => activeView.value = v, resetToDefault, toasts };
      }
    }).mount('#app');
  </script>
</body>
</html>
